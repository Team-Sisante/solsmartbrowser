<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SolSmartBrowser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .toolbar {
      background: #1a1a2e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }
    .nav-btn {
      background: #2a2a4a;
      border: none;
      color: #e0e0ff;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .nav-btn:hover, .nav-btn:active { background: #3a3a6a; }
    #url-bar {
      flex: 1;
      background: #12121e;
      border: 1px solid #3a3a6a;
      border-radius: 24px;
      padding: 12px 20px;
      color: #e0e0ff;
      font-size: 20px;
      outline: none;
    }
    #url-bar:focus { border-color: #7a7aff; }
    .go-btn {
      background: #7a7aff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .go-btn:hover { background: #5a5aea; }
    .add-fav-btn {
      background: #2a2a4a;
      border: none;
      color: #ffb347;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      line-height: 1;
    }
    .add-fav-btn:hover { background: #3a3a6a; }
    .popout-btn {
      background: #2a2a4a;
      border: none;
      color: #7a7aff;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      line-height: 1;
    }
    .popout-btn:hover { background: #3a3a6a; }
    .error-bar {
      display: none;
      background: #ffb347;
      color: #1a1a2e;
      padding: 8px 16px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      flex-shrink: 0;
    }
    .bookmarks {
      background: #12121e;
      padding: 8px 16px;
      display: flex;
      gap: 12px;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
      overflow-x: auto;
      align-items: center;
    }
    .bookmark {
      background: #2a2a4a;
      color: #ccc;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 18px;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bookmark:hover, .bookmark:active { background: #3a3a6a; color: white; }
    .bookmark .remove-fav {
      font-size: 14px;
      color: #ff9999;
      cursor: pointer;
      line-height: 1;
    }
    .bookmark .remove-fav:hover { color: #ff4444; }
    .browser-view {
      flex: 1;
      display: flex;
      background: #050510;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .loader {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: white;
      font-size: 40px;
    }
  </style>
</head>
<body>
  <div class="error-bar" id="error-bar"></div>
  <div class="toolbar">
    <button class="nav-btn" onclick="goBack()" title="Back">←</button>
    <button class="nav-btn" onclick="goForward()" title="Forward">→</button>
    <button class="nav-btn" onclick="reload()" title="Refresh">⟳</button>
    <input type="text" id="url-bar" placeholder="Enter URL or search..." autofocus>
    <button class="go-btn" onclick="navigate()">Go</button>
    <button class="add-fav-btn" onclick="addFavorite()" title="Add to Favorites">★</button>
    <button class="popout-btn" onclick="openInNewTab()" title="Open in new tab">🔗</button>
  </div>

  <div class="bookmarks" id="bookmarks-bar"></div>

  <div class="browser-view">
    <iframe id="browser-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
    <div class="loader" id="loader">Loading…</div>
  </div>

  <script>
    const frame = document.getElementById('browser-frame');
    const urlBar = document.getElementById('url-bar');
    const bookmarksBar = document.getElementById('bookmarks-bar');
    const errorBar = document.getElementById('error-bar');
    let currentUrl = '';

    // ---------- Default Favorites (all HTTPS) ----------
    const DEFAULT_FAVORITES = [
      { title: 'Google', url: 'https://www.google.com' },
      { title: 'YouTube TV', url: 'https://www.youtube.com/tv' },
      { title: 'Netflix', url: 'https://www.netflix.com' },
      { title: 'GitHub', url: 'https://github.com' },
      { title: 'Videoscraper', url: 'https://videoscraper.netlify.app/' }   // use HTTPS!
    ];

    let stored = localStorage.getItem('solSmartFavorites');
    let favorites = stored ? JSON.parse(stored) : null;
    if (!favorites || !Array.isArray(favorites) || favorites.length === 0) {
      favorites = DEFAULT_FAVORITES.slice();
    } else {
      DEFAULT_FAVORITES.forEach(def => {
        if (!favorites.some(fav => fav.url === def.url)) favorites.push(def);
      });
    }
    localStorage.setItem('solSmartFavorites', JSON.stringify(favorites));

    function saveFavorites() { localStorage.setItem('solSmartFavorites', JSON.stringify(favorites)); }

    function renderFavorites() {
      bookmarksBar.innerHTML = '';
      favorites.forEach((fav, index) => {
        const span = document.createElement('span');
        span.className = 'bookmark';
        span.innerHTML = `<span onclick="loadURL('${fav.url}')">${fav.title}</span> <span class="remove-fav" onclick="removeFavorite(${index}, event)">✕</span>`;
        bookmarksBar.appendChild(span);
      });
    }

    function addFavorite() {
      const url = currentUrl || urlBar.value.trim();
      if (!url || url === 'about:blank') return;
      let title = url;
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (doc && doc.title) title = doc.title.substring(0, 50);
      } catch (e) {}
      if (favorites.some(fav => fav.url === url)) {
        showError('Already in favorites!');
        return;
      }
      favorites.push({ url, title });
      saveFavorites();
      renderFavorites();
    }

    function removeFavorite(index, event) {
      event.stopPropagation();
      favorites.splice(index, 1);
      saveFavorites();
      renderFavorites();
    }

    function showError(msg) {
      errorBar.textContent = msg;
      errorBar.style.display = 'block';
      setTimeout(() => { errorBar.style.display = 'none'; }, 4000);
    }

    renderFavorites();

    // ---------- Navigation ----------
    function navigate() {
      let raw = urlBar.value.trim();
      if (!raw) return;
      if (!/^https?:\/\//i.test(raw)) {
        if (raw.includes('.') || raw.includes('localhost')) {
          raw = 'https://' + raw;
        } else {
          raw = 'https://www.google.com/search?q=' + encodeURIComponent(raw);
        }
      }
      loadURL(raw);
    }

    function loadURL(url) {
      currentUrl = url;
      urlBar.value = url;
      frame.src = url;
      // Simple mixed-content check
      if (window.location.protocol === 'https:' && url.startsWith('http://')) {
        showError('Warning: Mixed content – use HTTPS if possible');
      }
    }

    function goBack() {
      try { frame.contentWindow.history.back(); } catch (e) { showError('Cannot go back'); }
    }

    function goForward() {
      try { frame.contentWindow.history.forward(); } catch (e) { showError('Cannot go forward'); }
    }

    function reload() {
      try { frame.contentWindow.location.reload(); } catch (e) { showError('Cannot refresh'); }
    }

    function openInNewTab() {
      if (currentUrl) window.open(currentUrl, '_blank');
    }

    // If the iframe fails to load (e.g., blocked by X-Frame-Options), show a hint
    frame.addEventListener('error', () => {
      showError('Page blocked by the site – click 🔗 to open in new tab');
    });

    urlBar.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') navigate();
    });

    // Start with Google
    loadURL('https://www.google.com');
  </script>
</body>
</html>
