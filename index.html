<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SolSmartBrowser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .toolbar {
      background: #1a1a2e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }
    .nav-btn {
      background: #2a2a4a;
      border: none;
      color: #e0e0ff;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .nav-btn:hover, .nav-btn:active { background: #3a3a6a; }
    #url-bar {
      flex: 1;
      background: #12121e;
      border: 1px solid #3a3a6a;
      border-radius: 24px;
      padding: 12px 20px;
      color: #e0e0ff;
      font-size: 20px;
      outline: none;
    }
    #url-bar:focus { border-color: #7a7aff; }
    .go-btn {
      background: #7a7aff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .go-btn:hover { background: #5a5aea; }
    .bookmarks {
      background: #12121e;
      padding: 8px 16px;
      display: flex;
      gap: 12px;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .bookmark {
      background: #2a2a4a;
      color: #ccc;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 18px;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.2s;
    }
    .bookmark:hover, .bookmark:active { background: #3a3a6a; color: white; }
    .browser-view {
      flex: 1;
      display: flex;
      background: #050510;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .fallback-message {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.9);
      color: #e0e0ff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      text-align: center;
      padding: 40px;
    }
    .fallback-message button {
      margin-top: 20px;
      background: #7a7aff;
      border: none;
      color: white;
      padding: 16px 32px;
      font-size: 24px;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="nav-btn" onclick="goBack()" title="Back">←</button>
    <button class="nav-btn" onclick="goForward()" title="Forward">→</button>
    <button class="nav-btn" onclick="reload()" title="Refresh">⟳</button>
    <input type="text" id="url-bar" placeholder="Enter URL or search..." autofocus>
    <button class="go-btn" onclick="navigate()">Go</button>
  </div>

  <div class="bookmarks">
    <span class="bookmark" onclick="loadURL('https://www.google.com')">Google</span>
    <span class="bookmark" onclick="loadURL('https://www.youtube.com/tv')">YouTube TV</span>
    <span class="bookmark" onclick="loadURL('https://www.netflix.com')">Netflix</span>
    <span class="bookmark" onclick="loadURL('https://github.com')">GitHub</span>
    <span class="bookmark" onclick="loadURL('https://space-explorer-test.netlify.app')">Space Explorer</span>
  </div>

  <div class="browser-view">
    <iframe id="browser-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
    <div class="fallback-message" id="fallback">
      <p>This site can't be shown inside the browser.</p>
      <button onclick="openInNewTab()">Open in new tab</button>
    </div>
  </div>

  <script>
    const frame = document.getElementById('browser-frame');
    const urlBar = document.getElementById('url-bar');
    const fallback = document.getElementById('fallback');
    let currentUrl = '';

    // Initial load
    loadURL('https://www.google.com');

    // Detect iframe load errors due to X-Frame-Options or CSP
    frame.addEventListener('load', () => {
      try {
        // Check if the iframe actually loaded a document (same-origin can be read)
        const doc = frame.contentDocument || frame.contentWindow.document;
        // If the document is accessible and not empty, we're good
        if (doc && doc.body) {
          fallback.style.display = 'none';
          frame.style.display = 'block';
        } else {
          // Might be cross-origin, but no error yet – monitor for error events
        }
      } catch (e) {
        // Cross-origin, we can't inspect. The error event will catch blocked loads.
      }
    });

    // Catch iframe loading blocked (X-Frame-Options, CSP)
    frame.addEventListener('error', (e) => {
      // The iframe failed to load – show fallback
      fallback.style.display = 'flex';
      frame.style.display = 'none';
    });

    // Also monitor for a message from the iframe (not likely, but safety)
    window.addEventListener('message', (e) => {
      if (e.data === 'iframe-blocked') {
        fallback.style.display = 'flex';
        frame.style.display = 'none';
      }
    });

    function navigate() {
      let raw = urlBar.value.trim();
      if (!raw) return;
      if (!/^https?:\/\//i.test(raw)) {
        if (raw.includes('.') || raw.includes('localhost')) {
          raw = 'https://' + raw;
        } else {
          raw = 'https://www.google.com/search?q=' + encodeURIComponent(raw);
        }
      }
      loadURL(raw);
    }

    function loadURL(url) {
      currentUrl = url;
      urlBar.value = url;
      // Hide fallback, show iframe and attempt to load
      fallback.style.display = 'none';
      frame.style.display = 'block';
      frame.src = url;
    }

    function goBack() {
      try {
        frame.contentWindow.history.back();
      } catch (e) {}
    }

    function goForward() {
      try {
        frame.contentWindow.history.forward();
      } catch (e) {}
    }

    function reload() {
      try {
        frame.contentWindow.location.reload();
      } catch (e) {}
    }

    // Open the current URL in a new tab (bypassing the iframe)
    function openInNewTab() {
      if (currentUrl) {
        window.open(currentUrl, '_blank');
      }
    }

    urlBar.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') navigate();
    });
  </script>
</body>
</html>
