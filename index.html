<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SolSmartBrowser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .toolbar {
      background: #1a1a2e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }
    .nav-btn {
      background: #2a2a4a;
      border: none;
      color: #e0e0ff;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .nav-btn:hover, .nav-btn:active { background: #3a3a6a; }
    #url-bar {
      flex: 1;
      background: #12121e;
      border: 1px solid #3a3a6a;
      border-radius: 24px;
      padding: 12px 20px;
      color: #e0e0ff;
      font-size: 20px;
      outline: none;
    }
    #url-bar:focus { border-color: #7a7aff; }
    .go-btn {
      background: #7a7aff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .go-btn:hover { background: #5a5aea; }
    .add-fav-btn {
      background: #2a2a4a;
      border: none;
      color: #ffb347;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      line-height: 1;
    }
    .add-fav-btn:hover { background: #3a3a6a; }
    .bookmarks {
      background: #12121e;
      padding: 8px 16px;
      display: flex;
      gap: 12px;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
      overflow-x: auto;
      align-items: center;
    }
    .bookmark {
      background: #2a2a4a;
      color: #ccc;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 18px;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bookmark:hover, .bookmark:active { background: #3a3a6a; color: white; }
    .bookmark .remove-fav {
      font-size: 14px;
      color: #ff9999;
      cursor: pointer;
      line-height: 1;
    }
    .bookmark .remove-fav:hover { color: #ff4444; }
    .browser-view {
      flex: 1;
      display: flex;
      background: #050510;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .fallback-message {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.9);
      color: #e0e0ff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      text-align: center;
      padding: 40px;
    }
    .fallback-message button {
      margin-top: 20px;
      background: #7a7aff;
      border: none;
      color: white;
      padding: 16px 32px;
      font-size: 24px;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="nav-btn" onclick="goBack()" title="Back">←</button>
    <button class="nav-btn" onclick="goForward()" title="Forward">→</button>
    <button class="nav-btn" onclick="reload()" title="Refresh">⟳</button>
    <input type="text" id="url-bar" placeholder="Enter URL or search..." autofocus>
    <button class="go-btn" onclick="navigate()">Go</button>
    <button class="add-fav-btn" onclick="addFavorite()" title="Add to Favorites">★</button>
  </div>

  <div class="bookmarks" id="bookmarks-bar"></div>

  <div class="browser-view">
    <iframe id="browser-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
    <div class="fallback-message" id="fallback">
      <p>This site can't be shown inside the browser.</p>
      <button onclick="openInNewTab()">Open in new tab</button>
    </div>
  </div>

  <script>
    const frame = document.getElementById('browser-frame');
    const urlBar = document.getElementById('url-bar');
    const fallback = document.getElementById('fallback');
    const bookmarksBar = document.getElementById('bookmarks-bar');
    let currentUrl = '';
    let fallbackTimer = null;

    // ---------- Default + Dynamic Favorites ----------
    const DEFAULT_FAVORITES = [
      { title: 'Google', url: 'https://www.google.com' },
      { title: 'YouTube TV', url: 'https://www.youtube.com/tv' },
      { title: 'Netflix', url: 'https://www.netflix.com' },
      { title: 'GitHub', url: 'https://github.com' },
      { title: 'Space Explorer', url: 'https://space-explorer-test.netlify.app' }
    ];

    let stored = localStorage.getItem('solSmartFavorites');
    let favorites = stored ? JSON.parse(stored) : null;
    if (!favorites || !Array.isArray(favorites) || favorites.length === 0) {
      favorites = DEFAULT_FAVORITES.slice();
      localStorage.setItem('solSmartFavorites', JSON.stringify(favorites));
    } else {
      DEFAULT_FAVORITES.forEach(def => {
        if (!favorites.some(fav => fav.url === def.url)) {
          favorites.push(def);
        }
      });
      localStorage.setItem('solSmartFavorites', JSON.stringify(favorites));
    }

    function saveFavorites() {
      localStorage.setItem('solSmartFavorites', JSON.stringify(favorites));
    }

    function renderFavorites() {
      bookmarksBar.innerHTML = '';
      favorites.forEach((fav, index) => {
        const span = document.createElement('span');
        span.className = 'bookmark';
        span.innerHTML = `<span onclick="loadURL('${fav.url}')">${fav.title}</span> <span class="remove-fav" onclick="removeFavorite(${index}, event)">✕</span>`;
        bookmarksBar.appendChild(span);
      });
    }

    function addFavorite() {
      const url = currentUrl || urlBar.value.trim();
      if (!url || url === 'about:blank') return;
      let title = url;
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (doc && doc.title) title = doc.title.substring(0, 50);
      } catch (e) {}
      if (favorites.some(fav => fav.url === url)) {
        alert('Already in favorites!');
        return;
      }
      favorites.push({ url, title });
      saveFavorites();
      renderFavorites();
    }

    function removeFavorite(index, event) {
      event.stopPropagation();
      favorites.splice(index, 1);
      saveFavorites();
      renderFavorites();
    }

    renderFavorites();

    // ---------- Browser logic with robust fallback detection ----------
    frame.addEventListener('load', () => {
      if (fallbackTimer) clearTimeout(fallbackTimer);

      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (doc && doc.body && doc.body.innerHTML.length > 0) {
          fallback.style.display = 'none';
          frame.style.display = 'block';
          currentUrl = frame.contentWindow.location.href;
          urlBar.value = currentUrl;
          return;
        }
      } catch (e) {}

      fallbackTimer = setTimeout(() => {
        if (frame.src === currentUrl) {
          fallback.style.display = 'flex';
          frame.style.display = 'none';
        }
      }, 2000);
    });

    frame.addEventListener('error', () => {
      if (fallbackTimer) clearTimeout(fallbackTimer);
      fallback.style.display = 'flex';
      frame.style.display = 'none';
    });

    function navigate() {
      let raw = urlBar.value.trim();
      if (!raw) return;
      if (!/^https?:\/\//i.test(raw)) {
        if (raw.includes('.') || raw.includes('localhost')) {
          raw = 'https://' + raw;
        } else {
          raw = 'https://www.google.com/search?q=' + encodeURIComponent(raw);
        }
      }
      loadURL(raw);
    }

    function loadURL(url) {
      currentUrl = url;
      urlBar.value = url;
      fallback.style.display = 'none';
      frame.style.display = 'block';
      frame.src = url;
    }

    function goBack() {
      try { frame.contentWindow.history.back(); } catch (e) {}
    }

    function goForward() {
      try { frame.contentWindow.history.forward(); } catch (e) {}
    }

    function reload() {
      try { frame.contentWindow.location.reload(); } catch (e) {}
    }

    function openInNewTab() {
      if (currentUrl) window.open(currentUrl, '_blank');
    }

    urlBar.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') navigate();
    });

    loadURL('https://www.google.com');
  </script>
</body>
</html>
